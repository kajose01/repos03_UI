services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: mydb
      POSTGRES_USER: ubuntu
      POSTGRES_PASSWORD: jose123
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  app:
    build: ./app
    container_name: 3tier-adminer-app-1
    ports:
      - "5001:5000"
    environment:
      DB_HOST: myapp_db
      DB_USER: ubuntu
      DB_PASSWORD: jose123
      DB_NAME: mydb
    networks:
      - default
      - myapp-network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  adminer:
    image: adminer
    ports:
      - "8081:8080"

networks:
  myapp-network:
    external: true
    name: docker-compose-projects_myapp-network
